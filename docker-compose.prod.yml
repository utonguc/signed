services:
  db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${SIGNED_DB_PASSWORD:-signed_pass_prod}

  api:
    ports: !reset []
    environment:
      DATABASE_URL: postgresql://signature_user:${SIGNED_DB_PASSWORD:-signed_pass_prod}@db:5432/signature
      SIGNATURE_API_KEY: ${SIGNED_API_KEY:?SIGNED_API_KEY required}
      JWT_SECRET: ${SIGNED_JWT_SECRET:?SIGNED_JWT_SECRET required}
      ADMIN_EMAIL: ${SIGNED_ADMIN_EMAIL:-admin@xshield.com.tr}
      ADMIN_PASSWORD: ${SIGNED_ADMIN_PASSWORD:?SIGNED_ADMIN_PASSWORD required}
      PUBLIC_URL: https://signed.xshield.com.tr

  panel:
    ports: !reset []
    environment:
      API_URL: http://api:5000
      GATEWAY_HOST: signed.xshield.com.tr
      GATEWAY_PORT: "25"

  gateway:
    ports:
      - "2525:25"
    environment:
      SIGNATURE_API_KEY: ${SIGNED_API_KEY:?SIGNED_API_KEY required}
      MYHOSTNAME: signed.xshield.com.tr

networks:
  default:
    name: xshield-net
    external: true
