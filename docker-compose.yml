services:
  db:
    image: postgres:15
    container_name: signed_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signature
      POSTGRES_USER: signature_user
      POSTGRES_PASSWORD: signature_pass
    volumes:
      - ./init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signature_user -d signature"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./signature-core
    container_name: signed-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://signature_user:signature_pass@db:5432/signature
      SIGNATURE_API_KEY: dev-gateway-key-change-in-prod
      JWT_SECRET: change-this-jwt-secret-in-production
      ADMIN_EMAIL: admin@signature.local
      ADMIN_PASSWORD: changeme
      PUBLIC_URL: http://localhost:5000
      PORTAL_TOKEN_HOURS: "48"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  panel:
    build: ./panel
    container_name: signed-panel
    restart: unless-stopped
    environment:
      API_URL: http://api:5000
      GATEWAY_HOST: localhost
      GATEWAY_PORT: "2525"
    ports:
      - "3002:3000"
    depends_on:
      - api

  gateway:
    build: ./gateway
    container_name: signed-gateway
    restart: unless-stopped
    environment:
      SIGNATURE_API_URL: http://api:5000/v1/render
      SIGNATURE_API_KEY: dev-gateway-key-change-in-prod
      MYHOSTNAME: gateway.signature.local
    depends_on:
      - api
    ports:
      - "2525:25"

volumes:
  pgdata:
